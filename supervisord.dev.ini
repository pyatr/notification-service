[supervisord]
nodaemon=true
pidfile=/home/laravel/run/supervisor/supervisord.pid
logfile=/home/laravel/log/supervisor/supervisor.log
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:start]
command=sh /var/www/html/start.sh
priority=10
autostart=true
autorestart=false
# Don't try to restart if script is completed too fast
startsecs=0
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:php-fpm]
command=php-fpm
priority=20
autostart=true
autorestart=true
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:supercronic]
command=supercronic /etc/crontab/laravel
priority=30
autostart=true
autorestart=true
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout