[supervisord]
nodaemon=true
pidfile=/home/laravel/run/supervisor/supervisord.pid
logfile=/home/laravel/log/supervisor/supervisor.log
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:php-fpm]
command=php-fpm
priority=10
autostart=true
autorestart=true
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:start]
command=sh /var/www/html/start.sh
priority=20
autostart=true
autorestart=false
startsecs=0
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:supercronic]
command=supercronic /etc/crontab/laravel
priority=30
autostart=true
autorestart=true
stderr_logfile_maxbytes=0
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stdout_logfile=/dev/stdout

[program:queue-listener]
command=php /var/www/html/artisan queue:work --sleep=3 --tries=3
priority=40
autostart=true
autorestart=true
numprocs=10
process_name=%(program_name)s_%(process_num)02dd
redirect_stderr=true
stdout_logfile=/var/www/html/storage/logs/queue.log
